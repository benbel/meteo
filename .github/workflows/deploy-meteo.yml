name: Deploy meteo.html to GitHub Pages

on:
  schedule:
    - cron: "0 4 * * *"  
  push: {}
  workflow_dispatch: {}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + stage Pages content
        run: |
          python3 meteo.py
          mkdir -p public
          cp -f index.html public/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - uses: actions/deploy-pages@v4
